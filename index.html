<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta charset="utf-8" />
  <title>stemsplat</title>

  <!-- nunito sans -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- tailwind (cdn build) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg-1: #0F2027;   /* emerald dusk left */
      --bg-2: #2C5364;   /* emerald dusk right */
      --txt-main: #E7ECEF;
      --txt-dim: #B8C4CC;
      --accent:  #8ED8FF; /* subtle cyan accent for highlights only */
      --icon:   #9BB6C2;
      --card: rgba(23, 35, 41, 0.55);
      --card-done: rgba(40, 66, 77, 0.70);
      --border: rgba(255,255,255,0.06);
    }
    /* Animated light blur for settings overlay BACKGROUND (not the card) */
    @keyframes overlayBlurIn {
      from { backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); background-color: rgba(0, 0, 0, 0.0); }
      to   { backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); background-color: rgba(0, 0, 0, 0.35); }
    }
    .overlay-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      background-color: rgba(0, 0, 0, 0.0);
    }
    .overlay-bg.anim     { animation: overlayBlurIn .28s ease both; }
    @keyframes overlayBlurOut {
      from { backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); background-color: rgba(0, 0, 0, 0.35); }
      to   { backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); background-color: rgba(0, 0, 0, 0.0); }
    }
    .overlay-bg.anim-out { animation: overlayBlurOut 0.18s ease both; }
    @keyframes settingsCardIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1.00); }
    }
    @keyframes settingsCardOut {
      from { opacity: 1; transform: translateY(0)    scale(1.00); }
      to   { opacity: 0; transform: translateY(6px)  scale(0.98); }
    }
    .settings-card-in  { animation: settingsCardIn  .28s cubic-bezier(.2,.7,.2,1) both; }
    .settings-card-out { animation: settingsCardOut .18s ease both; }

    :root { --page-gap: clamp(64px, 14vh, 132px); }
    body { background: linear-gradient(135deg, #0B1A1F 0%, var(--bg-1) 35%, var(--bg-2) 100%); }
    #page-top-gap, #queue-bottom-pad { height: var(--page-gap); flex-shrink: 0; }

    .noise::before { content: ""; position: fixed; inset: 0; pointer-events: none;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/></filter><rect width="120" height="120" filter="url(%23n)" opacity="0.035"/></svg>') repeat; opacity:.18; }
    .shade { position: fixed; inset: 0; pointer-events: none; background: rgba(0,0,0,0.24); z-index: -1; }

    .glass { background: var(--card); backdrop-filter: blur(12px) saturate(110%); -webkit-backdrop-filter: blur(12px) saturate(110%); border: 1px solid var(--border); box-shadow: 0 8px 26px rgba(0,0,0,.28); }
    .glass-light { background: rgba(255,255,255,0.12); backdrop-filter: blur(10px) saturate(110%); -webkit-backdrop-filter: blur(10px) saturate(110%); border: 1px solid rgba(255,255,255,0.18); box-shadow: 0 8px 26px rgba(0,0,0,.28); }
    .card   { position: relative; overflow: visible; transition: background .20s ease; will-change: transform, opacity; transform: translateZ(0); contain: paint; flex-shrink: 0; }
    .card:hover { box-shadow: 0 8px 26px rgba(0,0,0,.28); }
    .card:has(.dl-pad:hover):hover { box-shadow: 0 12px 40px rgba(0,0,0,.35); }
    .card.done { background: var(--card-done); }

    #title { letter-spacing: 0.5px; text-shadow: 0 8px 40px rgba(0,0,0,.45); }

    .fade-in { animation: fade .7s ease forwards; }
    @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .btn { display:inline-flex; align-items:center; justify-content:center; border-radius:12px; padding:6px 10px; font-size:12px; font-weight:600; transition: transform .15s ease, box-shadow .15s ease; }
    .btn:focus { outline: 2px solid rgba(255,255,255,.25); outline-offset: 2px; }
    .btn:hover { transform: translateY(-1px); }

    .close-btn { position: fixed; top: 14px; left: 14px; width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.12); color: #E7ECEF; backdrop-filter: blur(10px) saturate(120%); -webkit-backdrop-filter: blur(10px) saturate(120%); box-shadow: 0 10px 30px rgba(0,0,0,.25); display: grid; place-items: center; font-size: 18px; transition: transform .18s ease, box-shadow .18s ease, background .18s ease; z-index: 20; }
    .close-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(0,0,0,.35); background: rgba(255,255,255,0.22); }

    .chip { font-size:11px; padding:3px 8px; border-radius:999px; color: #ffffff; background: rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.18); }
    .chip-dim { background: rgba(0,0,0,.38); border:1px solid rgba(255,255,255,.10); color:#E7ECEF; }
    .queued-chip-default { display: inline; }
    .queued-chip-clear { display: none; color: inherit; text-decoration: underline; }
    .item-row:hover .chip .queued-chip-default { display: none; }
    .item-row:hover .chip .queued-chip-clear { display: inline; }
    .settings-select-wrap{ position: relative; }
    .settings-select{
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: var(--txt-main);
      padding: 9px 34px 9px 10px;
      font-size: 13px;
      line-height: 1.1;
      outline: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .settings-select:focus{
      border-color: rgba(142,216,255,.75);
      box-shadow: 0 0 0 2px rgba(142,216,255,.18);
    }
    .settings-select-wrap::after{
      content:'';
      position:absolute;
      right:12px;
      top:50%;
      width:8px;
      height:8px;
      border-right:2px solid rgba(231,236,239,.85);
      border-bottom:2px solid rgba(231,236,239,.85);
      transform: translateY(-70%) rotate(45deg);
      pointer-events:none;
    }
    .settings-check-label{ display:flex; align-items:center; gap:8px; color:var(--txt-main); font-size:13px; }
    .settings-destination-row{ display:flex; align-items:center; gap:8px; }
    .settings-input{
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: var(--txt-main);
      padding: 9px 10px;
      font-size: 13px;
      line-height: 1.1;
      outline: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: opacity .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .settings-input:focus{
      border-color: rgba(142,216,255,.75);
      box-shadow: 0 0 0 2px rgba(142,216,255,.18);
    }
    .settings-input[disabled]{
      opacity: .58;
      cursor: not-allowed;
      pointer-events: none;
    }
    .settings-icon-btn{
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: var(--txt-main);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s ease, border-color .15s ease, opacity .15s ease;
    }
    .settings-icon-btn:hover{ transform: translateY(-1px); border-color: rgba(255,255,255,.35); }
    .settings-icon-btn:disabled{ opacity: .58; cursor: not-allowed; transform: none; }

    .bar { height: 10px; background: rgba(255,255,255,.08); border-radius:999px; overflow: hidden; }
    .bar-fill { height:100%; width:0%; background: linear-gradient(90deg, #e7eef2, #dfe7ec); will-change: width; }

    /* pretty checkboxes */
    input.pretty{ appearance:none; -webkit-appearance:none; width:18px; height:18px; border:1.5px solid rgba(255,255,255,.35); border-radius:6px; background: transparent; display:inline-grid; place-items:center; transition: all .18s ease; }
    input.pretty:hover{ border-color: rgba(255,255,255,.6); box-shadow: 0 0 0 3px rgba(255,255,255,.06) inset; }
    input.pretty:checked{ background: linear-gradient(135deg, #96c5d6, #5fa3b5); border-color: transparent; }
    input.pretty:checked::after{ content:""; width:6px; height:10px; border:2px solid #0F2027; border-top:0; border-left:0; transform: rotate(45deg); }

    #top-vig, #bot-vig {
      pointer-events:none;
      position:fixed;
      left:0;
      right:0;
      height:120px;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,.42) 0%,
        rgba(0,0,0,.28) 28%,
        rgba(0,0,0,.14) 58%,
        rgba(0,0,0,0) 100%
      );
      opacity:0;
      transition:opacity .32s ease;
      z-index: 8;
    }
    #top-vig{ top:0; bottom:auto; transform:none; }
    #bot-vig{ top:auto; bottom:0; transform:rotate(180deg); }
    #bot-blur{
      pointer-events:none;
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      height:120px;
      backdrop-filter: blur(7px) saturate(110%);
      -webkit-backdrop-filter: blur(7px) saturate(110%);
      mask-image: linear-gradient(
        to top,
        rgba(0,0,0,.52) 0%,
        rgba(0,0,0,.24) 46%,
        rgba(0,0,0,0) 100%
      );
      -webkit-mask-image: linear-gradient(
        to top,
        rgba(0,0,0,.52) 0%,
        rgba(0,0,0,.24) 46%,
        rgba(0,0,0,0) 100%
      );
      opacity:.42;
      z-index:7;
    }

    .dl-pad,
    .stop-pad { width:56px; height:56px; border-radius:14px; background: rgba(255,255,255,0.95); color:#0F2027; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(0,0,0,.28); opacity:0; transform: translateX(-10px); transition: opacity .42s ease, transform .42s ease, box-shadow .20s ease; pointer-events:none; align-self: center; position: absolute; top: 50%; transform: translateY(-50%); }
    .dl-pad.show,
    .stop-pad.show { opacity:1; transform: translateX(0) translateY(-50%); pointer-events:auto; }
    .dl-pad:hover,
    .stop-pad:hover { box-shadow:0 12px 30px rgba(0,0,0,.35); }
    .item-row { position: relative; padding-right: 84px; }
    .dl-pad { right: 12px; }
    .stop-pad { right: 12px; }
    .dl-pad svg, .stop-pad svg { display:block; margin:auto; }

    @keyframes breathe { 0%{transform:translateY(0)} 50%{transform:translateY(-2px)} 100%{transform:translateY(0)} }
    .micro { animation: breathe 3s ease-in-out infinite; }
    .slide-out { opacity: 0; transform: translateY(-10px); transition: transform .35s ease-in-out, opacity .35s ease-in-out; }
    .enter-pre { opacity: 0; transform: translateY(8px); }
    .enter-active { opacity: 1; transform: translateY(0); transition: transform .35s ease-in-out, opacity .35s ease-in-out; }
    /* leave/fade/slide transition for queue items */
    .leave { opacity: 1; transform: translateY(0); }
    .leave-active { transition: transform .16s ease-in-out, opacity .16s ease-in-out; }
    .leave-to { opacity: 0; transform: translateY(-2px); }
    #clear-btn { opacity: 0; transition: opacity .25s ease; }
    #clear-btn.show { opacity: 1; }
    #queue-spacer { height: 0; transition: height .18s ease-in-out; will-change: height; }
    .fade { transition: opacity .20s ease; }

    
    .page-mask { position:fixed; inset:0; background: rgba(0,0,0,0.0); pointer-events:none; opacity:0; transition: opacity .28s ease; }
    .page-mask.show { opacity:1; }
    .port-note-overlay { position: fixed; inset: 0; z-index: 90; display: grid; place-items: center; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); background: rgba(0,0,0,0.35); }
    .port-note-card { width: min(720px, 92vw); max-height: 86vh; overflow: auto; }
    .port-snippet { position: relative; border-radius: 12px; border: 1px solid rgba(255,255,255,0.14); background: rgba(0,0,0,0.35); padding: 12px; }
    .port-snippet pre { margin: 0; overflow-x: auto; font-size: 12px; line-height: 1.45; color: #E7ECEF; }
    .copy-chip { position: absolute; top: 8px; right: 8px; border-radius: 8px; padding: 4px 8px; font-size: 11px; color: #0F2027; background: rgba(255,255,255,0.9); border: 0; cursor: pointer; }
@media (prefers-reduced-motion: reduce){ .fade-in{ animation:none; } .btn:hover{ transform:none; } .card:hover{ transform:none; } .micro{ animation:none; } }
    /* Prevent flashing UI before intro animation */
    .intro .pre-hide{ opacity: 0; }
    @view-transition { navigation: auto; }
  </style>

  <script>
    if (localStorage.getItem('playIntro')) {
      document.documentElement.classList.add('intro');
    }
  </script>
</head>

<body class="min-h-screen flex flex-col items-center justify-center gap-10" style="font-family: 'Nunito Sans', sans-serif;">

  <div class="noise fixed inset-0 -z-10"></div>
  <div class="shade"></div>
  <button id="close-app" class="close-btn" title="close stemsplat" aria-label="close">
    ×
  </button>

  <div id="page-top-gap" class="w-full"></div>


  <!-- header -->
  <h1 id="title" class="text-5xl md:text-6xl font-light text-[var(--txt-main)] select-none tracking-tight">stemsplat</h1>
  <!-- controls -->
  <div class="w-11/12 max-w-3xl flex gap-6">
    <label id="dropzone" for="file-input" class="glass pre-hide relative flex-1 px-10 py-14 rounded-3xl text-center fade-in flex flex-col items-center justify-center gap-6 cursor-pointer transition-transform duration-200 hover:scale-105" role="button" tabindex="0">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-14 h-14 stroke-[var(--icon)]" fill="none" viewBox="0 0 24 24" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15V9m0 0l3 3m-3-3L9 12m3 9a9 9 0 110-18 9 9 0 010 18z" />
      </svg>
      <p class="text-lg text-[var(--txt-main)]">drag audio/video here <br>or click to choose files</p>
      <input id="file-input" type="file" accept="audio/*,video/*" multiple aria-label="choose media files" class="sr-only" />
    </label>
    <div class="flex flex-col gap-4 w-64">
      <div id="stems-card" class="glass pre-hide w-64 p-6 rounded-3xl flex flex-col gap-2 fade-in text-[var(--txt-main)]/90 relative">
        <button id="settings-btn" title="settings" class="absolute top-3 right-3 z-10 p-2 rounded-lg hover:bg-white/10 focus:outline-none focus:ring-2 focus:ring-white/30 cursor-pointer">
          <svg viewBox="0 0 24 24" class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0A1.65 1.65 0 0 0 9 3.09V3a2 2 0 1 1 4 0v.09c0 .65.38 1.24.97 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06c-.47.47-.61 1.18-.33 1.82h0c.27.6.86.97 1.51.97H21a2 2 0 1 1 0 4h-.09c-.65 0-1.24.38-1.51.97Z"></path>
          </svg>
        </button>
        <p class="text-sm text-[var(--txt-main)] mt-0">stems</p>
        <label class="flex items-center gap-2 text-[var(--txt-main)]"><input id="vocals-box" type="radio" name="stems" class="pretty" checked>vocals (fastest)</label>
        <label class="flex items-center gap-2 text-[var(--txt-main)]"><input id="inst-box" type="radio" name="stems" class="pretty">instrumental (fastest)</label>
        <label class="flex items-center gap-2 text-[var(--txt-main)]"><input id="deux-box" type="radio" name="stems" class="pretty">both (deux)</label>
        <label class="flex items-center gap-2 text-[var(--txt-main)]"><input id="both-separate-box" type="radio" name="stems" class="pretty">both (separate)</label>
      </div>
      <button id="start-btn" class="glass-light pre-hide w-64 px-6 py-4 rounded-3xl flex flex-col items-center justify-center fade-in focus:outline-none focus:ring-2 focus:ring-white/30 text-white disabled:opacity-50 disabled:cursor-not-allowed">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 micro" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <span class="btn-title mt-1 text-sm font-semibold">start</span>
      </button>
    </div>
  </div>

  <!-- queue -->
  <div id="queue" class="pre-hide w-11/12 max-w-2xl flex flex-col gap-4"></div>
  <div id="queue-spacer" class="w-11/12 max-w-2xl"></div>
  <button id="clear-btn" class="pre-hide mt-4 text-white underline">clear all</button>
  <div id="queue-bottom-pad" class="w-11/12 max-w-2xl"></div>
  <div id="top-vig"></div>
  <div id="bot-blur"></div>
  <div id="bot-vig"></div>

  <!-- templates & scripts -->
  <template id="item-template">
    <div class="item-row flex items-center gap-3">
      <div class="glass card rounded-xl px-6 py-4 flex-1 flex flex-col gap-3">
        <div class="flex justify-between items-center gap-3">
          <div class="flex items-center gap-2 min-w-0">
            <span class="truncate text-[var(--txt-main)] text-sm filename"></span>
            <div class="labels flex items-center gap-1"></div>
          </div>
          <div class="flex items-center gap-3">
            <span class="chip status">queued</span>
          </div>
        </div>
        <div class="bar"><div class="bar-fill progress"></div></div>
      </div>
      <button class="dl-pad self-center" type="button" title="open folder">
        <svg viewBox="0 0 24 24" class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7h5l2 3h11v9H3z"/>
          <path d="M3 7v12"/>
        </svg>
      </button>
      <a class="stop-pad self-center" href="#" title="stop" style="display:none;">
        <!-- square icon -->
        <svg viewBox="0 0 24 24" class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="6" y="6" width="12" height="12"/>
        </svg>
      </a>
    </div>
  </template>

  <script>
    /* helpers */
    const MAX_TASKS = 50;
    const STORAGE_WARN_GB = 1;
    const STORAGE_BLOCK_GB = 0.5;
    const MEMORY_LIMIT_RATIO = 0.9;
    const MEMORY_LIMIT_MB = 700;
    const FIVE_HOURS_SEC = 5 * 60 * 60;
    const LONG_TRACK_SEC = 15 * 60;

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const vocalsBox = document.getElementById('vocals-box');
    const instBox   = document.getElementById('inst-box');
    const deuxBox   = document.getElementById('deux-box');
    const bothSeparateBox = document.getElementById('both-separate-box');
    const queue     = document.getElementById('queue');
    const clearBtn  = document.getElementById('clear-btn');
    const topVig    = document.getElementById('top-vig');
    const botVig    = document.getElementById('bot-vig');
    const bottomPad = document.getElementById('queue-bottom-pad');
    const template  = document.getElementById('item-template');
    const title     = document.getElementById('title');
    const spacer    = document.getElementById('queue-spacer');
    const closeBtn  = document.getElementById('close-app');
    const startBtn  = document.getElementById('start-btn');
    const structureCheck = null;
    const structurelessCheck = null;
    let storageBlocked = false;
    let memoryBlocked = false;
    let lastStorageWarning = 0;
    let lastMemoryWarning = 0;

    let startPressed = false;
    let startGeneration = 0;
    let startLock = false;
    let appReady = false;
    let appReadyChecking = true;
    let modelsPopupShown = false;
    let modelsPopupDismissed = localStorage.getItem('modelsPopupDismissed') === '1';
    let settingsState = {
      output_root: '',
      structure_mode: 'flat',
      output_format: 'mp3_320',
      preserve_metadata: true,
      preserve_album_art: true,
      zip_outputs: true,
    };
    let defaultOutputPath = '';
    let dirPickerInput = null;
    updateStartButton();
    function updateStartButton(){
      if(!startBtn) return;
      const hasItems = queue.children.length > 0;
      if(!hasItems || startLock || storageBlocked || memoryBlocked){
        startBtn.disabled = true;
        const icon = startBtn.querySelector('svg');
        if(icon){ icon.style.animation = 'none'; }
      }else{
        startBtn.disabled = false;
        const icon = startBtn.querySelector('svg');
        if(icon){ icon.style.animation = ''; }
      }
    }

    function stageForDisplay(stage){
      if(!appReady && (!stage || stage === 'ready' || stage === 'queued')) return 'preparing';
      return stage;
    }

    function formatStageLabel(stage, pct){
      const effectiveStage = stageForDisplay(stage);
      if(effectiveStage === 'preparing') return 'preparing';
      const friendlyStage = displayStage(effectiveStage);
      if(effectiveStage === 'ready' || effectiveStage === 'queued'){
        return friendlyStage || 'queued';
      }
      if(typeof pct === 'number' && pct >= 0){
        const sp = Math.round(Math.max(0, Math.min(100, pct)));
        return friendlyStage ? `${friendlyStage} (${sp}%)` : `${sp}%`;
      }
      return friendlyStage || 'queued';
    }

    function formatEta(seconds){
      const total = Math.max(1, Math.round(seconds));
      if(total >= 3600){
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        return m > 0 ? `${h}h ${m}m` : `${h}h`;
      }
      if(total >= 60){
        const m = Math.floor(total / 60);
        const s = total % 60;
        return s > 0 ? `${m}m ${s}s` : `${m}m`;
      }
      return `${total}s`;
    }

    function formatSongPreview(name, maxChars = 25){
      const value = String(name || '');
      return value.length > maxChars ? `${value.slice(0, maxChars)}...` : value;
    }

    function stripMediaSuffix(name){
      return String(name || '').replace(/\.(wav|wave|mp3|m4a|aac|flac|ogg|oga|opus|mp4|mov|mkv|webm|m4v|avi|flv|wmv|mpg|mpeg|3gp|mts|m2ts|ogv)$/i, '');
    }

    function parseStemName(name){
      const raw = String(name || '');
      const base = raw.split(' - ').pop() || raw;
      return stripMediaSuffix(base).trim().toLowerCase();
    }

    function isBothSeparateStemSelection(stemsList){
      if(!Array.isArray(stemsList) || stemsList.length !== 2) return false;
      const normalized = stemsList.map((s) => parseStemName(s));
      return normalized.includes('vocals') && normalized.includes('instrumental');
    }

    function isBothSeparateTask(taskRef, data){
      if(taskRef && isBothSeparateStemSelection(taskRef.stemsSelection)) return true;
      if(data && isBothSeparateStemSelection(data.stems)) return true;
      if(taskRef && isBothSeparateStemSelection(taskRef.stems)) return true;
      return false;
    }

    function detectProcessingMode(taskRef, data){
      const normalized = [];
      const add = (arr) => {
        if(!Array.isArray(arr)) return;
        arr.forEach((name) => {
          const parsed = parseStemName(name);
          if(parsed) normalized.push(parsed);
        });
      };
      add(taskRef && taskRef.stemsSelection);
      add(data && data.stems);
      add(taskRef && taskRef.stems);

      const uniq = [...new Set(normalized)];
      if(!uniq.length) return 'generic';
      if(uniq.includes('deux') || (uniq.includes('vocals (deux)') && uniq.includes('instrumental (deux)'))){
        return 'deux';
      }
      if(uniq.length === 2 && uniq.includes('vocals') && uniq.includes('instrumental')){
        return 'bothSeparate';
      }
      if(uniq.length === 1 && uniq[0] === 'vocals') return 'vocals';
      if(uniq.length === 1 && uniq[0] === 'instrumental') return 'instrumental';
      return 'generic';
    }

    function mapByRange(value, inMin, inMax, outMin, outMax){
      const num = Number(value);
      if(!Number.isFinite(num) || inMax <= inMin) return outMin;
      const clamped = Math.max(inMin, Math.min(inMax, num));
      const frac = (clamped - inMin) / (inMax - inMin);
      return outMin + frac * (outMax - outMin);
    }

    function mapBothSeparateProgress(stage, pct){
      const s = String(stage || '').toLowerCase();
      if(s === 'done') return 100;
      if(
        s.startsWith('preparing') ||
        s.startsWith('prepare.') ||
        s.startsWith('load_audio') ||
        s === 'queued' ||
        s === 'ready'
      ){
        return 0;
      }
      if(s.startsWith('left.start')) return 0;
      if(s.startsWith('left.split_vocals.start')) return 0;
      if(s.startsWith('left.vocals')) return mapByRange(pct, 2, 38, 0, 25);
      if(s.startsWith('left.split_vocals.done')) return 25;

      if(s.startsWith('left.instrumental.start')) return 25;
      if(s.startsWith('left.instrumental')) return mapByRange(pct, 2, 49, 25, 50);
      if(s.startsWith('left.channel.done')) return 50;

      if(s.startsWith('right.start')) return 50;
      if(s.startsWith('right.split_vocals.start')) return 50;
      if(s.startsWith('right.vocals')) return mapByRange(pct, 51, 87, 50, 75);
      if(s.startsWith('right.split_vocals.done')) return 75;

      if(s.startsWith('right.instrumental.start')) return 75;
      if(s.startsWith('right.instrumental')) return mapByRange(pct, 51, 99, 75, 100);
      if(s.startsWith('right.channel.done')) return 100;

      if(
        s.startsWith('write.') ||
        s.startsWith('merge.') ||
        s.startsWith('zip.') ||
        s.startsWith('finalizing')
      ){
        return 100;
      }
      return null;
    }

    function isFinishingStage(stage){
      const s = String(stage || '').toLowerCase();
      return (
        s.startsWith('write.') ||
        s.startsWith('merge.') ||
        s.startsWith('zip.') ||
        s.startsWith('metadata.') ||
        s.startsWith('video.mux') ||
        s.startsWith('finalizing')
      );
    }

    function clampEtaForDisplay(etaSeconds, displayPct, stage){
      if(!Number.isFinite(etaSeconds)) return null;
      const pct = Math.max(0, Math.min(100, Number(displayPct) || 0));
      const s = String(stage || '').toLowerCase();
      if(s === 'done' || pct >= 100) return 0;

      let clamped = Number(etaSeconds);
      if(pct >= 99){
        clamped = Math.min(clamped, 2);
      } else if(pct >= 98){
        clamped = Math.min(clamped, 4);
      } else if(pct >= 96){
        clamped = Math.min(clamped, 8);
      }
      if(isFinishingStage(s)){
        if(pct >= 95) clamped = Math.min(clamped, 6);
        if(pct >= 98) clamped = Math.min(clamped, 3);
      }
      if(clamped < 0.75) return null;
      return clamped;
    }

    function mapModeProgress(mode, stage, pct){
      const s = String(stage || '').toLowerCase();
      if(mode === 'bothSeparate'){
        return mapBothSeparateProgress(stage, pct);
      }
      if(mode === 'vocals'){
        if(s.startsWith('left.vocals')) return mapByRange(pct, 2, 38, 0, 50);
        if(s.startsWith('left.split_vocals.done')) return 50;
        if(s.startsWith('right.vocals')) return mapByRange(pct, 51, 87, 50, 100);
        if(s.startsWith('right.split_vocals.done')) return 100;
        if(isFinishingStage(s) || s === 'done') return 100;
      }
      if(mode === 'instrumental'){
        if(s.startsWith('left.instrumental')) return mapByRange(pct, 2, 49, 0, 50);
        if(s.startsWith('left.channel.done')) return 50;
        if(s.startsWith('right.instrumental')) return mapByRange(pct, 51, 99, 50, 100);
        if(s.startsWith('right.channel.done')) return 100;
        if(isFinishingStage(s) || s === 'done') return 100;
      }
      if(mode === 'deux'){
        if(s.startsWith('deux')) return mapByRange(pct, 2, 96, 0, 100);
        if(isFinishingStage(s) || s === 'done') return 100;
      }
      return null;
    }

    function getModePhase(mode, stage, pct){
      const s = String(stage || '').toLowerCase();
      if(mode === 'bothSeparate'){
        if(s.startsWith('left.vocals') || s.startsWith('left.split_vocals.done')){
          return { id: 'vocals-left', index: 0, total: 4, progress: s.startsWith('left.split_vocals.done') ? 1 : mapByRange(pct, 2, 38, 0, 1) };
        }
        if(s.startsWith('left.instrumental') || s.startsWith('left.channel.done')){
          return { id: 'instrumental-left', index: 1, total: 4, progress: s.startsWith('left.channel.done') ? 1 : mapByRange(pct, 2, 49, 0, 1) };
        }
        if(s.startsWith('right.vocals') || s.startsWith('right.split_vocals.done')){
          return { id: 'vocals-right', index: 2, total: 4, progress: s.startsWith('right.split_vocals.done') ? 1 : mapByRange(pct, 51, 87, 0, 1) };
        }
        if(s.startsWith('right.instrumental') || s.startsWith('right.channel.done')){
          return { id: 'instrumental-right', index: 3, total: 4, progress: s.startsWith('right.channel.done') ? 1 : mapByRange(pct, 51, 99, 0, 1) };
        }
      }
      if(mode === 'vocals'){
        if(s.startsWith('left.vocals') || s.startsWith('left.split_vocals.done')){
          return { id: 'vocals-left', index: 0, total: 2, progress: s.startsWith('left.split_vocals.done') ? 1 : mapByRange(pct, 2, 38, 0, 1) };
        }
        if(s.startsWith('right.vocals') || s.startsWith('right.split_vocals.done')){
          return { id: 'vocals-right', index: 1, total: 2, progress: s.startsWith('right.split_vocals.done') ? 1 : mapByRange(pct, 51, 87, 0, 1) };
        }
      }
      if(mode === 'instrumental'){
        if(s.startsWith('left.instrumental') || s.startsWith('left.channel.done')){
          return { id: 'instrumental-left', index: 0, total: 2, progress: s.startsWith('left.channel.done') ? 1 : mapByRange(pct, 2, 49, 0, 1) };
        }
        if(s.startsWith('right.instrumental') || s.startsWith('right.channel.done')){
          return { id: 'instrumental-right', index: 1, total: 2, progress: s.startsWith('right.channel.done') ? 1 : mapByRange(pct, 51, 99, 0, 1) };
        }
      }
      if(mode === 'deux' && s.startsWith('deux')){
        return { id: 'deux', index: 0, total: 1, progress: mapByRange(pct, 2, 96, 0, 1) };
      }
      if(isFinishingStage(s) || s === 'done'){
        return { id: 'finishing', index: 99, total: 99, progress: 1 };
      }
      return null;
    }

    function estimateEtaFromPhase(etaState, mode, stage, pct, nowMs){
      const phase = getModePhase(mode, stage, pct);
      if(!phase) return null;

      if(etaState.startedAtMs == null){
        etaState.startedAtMs = nowMs;
      }
      if(etaState.currentPhaseId !== phase.id){
        if(etaState.currentPhaseId && etaState.phaseStartMs != null){
          const doneSec = Math.max(0, (nowMs - etaState.phaseStartMs) / 1000);
          if(Number.isFinite(doneSec) && doneSec >= 0.5){
            etaState.completedPhaseSec.push(doneSec);
          }
        }
        etaState.currentPhaseId = phase.id;
        etaState.phaseStartMs = nowMs;
      }
      if(etaState.phaseStartMs == null){
        etaState.phaseStartMs = nowMs;
      }

      const phaseElapsedSec = Math.max(0, (nowMs - etaState.phaseStartMs) / 1000);
      const avgCompletedSec = etaState.completedPhaseSec.length
        ? etaState.completedPhaseSec.reduce((sum, sec) => sum + sec, 0) / etaState.completedPhaseSec.length
        : null;

      let currentPhaseTotalSec = null;
      if(phase.progress >= 0.15){
        currentPhaseTotalSec = phaseElapsedSec / Math.max(phase.progress, 0.05);
      } else if(avgCompletedSec != null){
        currentPhaseTotalSec = avgCompletedSec;
      }
      if(currentPhaseTotalSec == null || !Number.isFinite(currentPhaseTotalSec)){
        return null;
      }

      const currentRemainingSec = Math.max(0, currentPhaseTotalSec - phaseElapsedSec);
      const remainingPhaseCount = Math.max(0, phase.total - phase.index - 1);
      const perFuturePhaseSec = avgCompletedSec != null ? avgCompletedSec : currentPhaseTotalSec;
      const rawEtaSec = currentRemainingSec + (remainingPhaseCount * perFuturePhaseSec);

      const runtimeSec = etaState.startedAtMs == null ? 0 : (nowMs - etaState.startedAtMs) / 1000;
      const warmEnough = runtimeSec >= 8 && (phase.index > 0 || phase.progress >= 0.22 || etaState.completedPhaseSec.length >= 1);
      if(!warmEnough || !Number.isFinite(rawEtaSec) || rawEtaSec < 1){
        return null;
      }

      etaState.smoothedEtaSec = etaState.smoothedEtaSec == null
        ? rawEtaSec
        : ((etaState.smoothedEtaSec * 0.82) + (rawEtaSec * 0.18));
      return etaState.smoothedEtaSec;
    }

    function estimateEtaFromHistory(etaState, mode, taskRef, nowMs){
      if(!etaState || etaState.startedAtMs == null) return null;
      if(!taskRef) return null;
      const songSeconds = Number(taskRef.durationSec);
      if(!Number.isFinite(songSeconds) || songSeconds <= 0) return null;
      const throughput = getAverageThroughput(mode);
      if(!Number.isFinite(throughput) || throughput <= 0) return null;

      const elapsedSec = Math.max(0, (nowMs - etaState.startedAtMs) / 1000);
      if(elapsedSec < 5) return null;
      const predictedTotalSec = songSeconds / throughput;
      if(!Number.isFinite(predictedTotalSec) || predictedTotalSec <= 0) return null;

      const remainingSec = predictedTotalSec - elapsedSec;
      if(!Number.isFinite(remainingSec) || remainingSec <= 1) return null;
      const clamped = Math.min(remainingSec, songSeconds * 10);
      etaState.smoothedEtaSec = etaState.smoothedEtaSec == null
        ? clamped
        : ((etaState.smoothedEtaSec * 0.86) + (clamped * 0.14));
      return etaState.smoothedEtaSec;
    }

      ];
      const sendShutdown = async () => {
        const tasks = shutdownEndpoints.map(({ url, options }) => (
          fetch(url, options).catch(() => {
            try { navigator.sendBeacon(url, new Blob()); } catch(_) {}
          })
        ));
        await Promise.allSettled(tasks);

    function guardClick(el, handler, cooldown = 600){
      if(!el || typeof handler !== 'function') return;
      if(el.__guardedHandler){
        el.removeEventListener('click', el.__guardedHandler);
      }
      let busy = false;
      const wrapped = async (e) => {
        if(busy){
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        busy = true;
        try{
          await handler(e);
        }finally{
          setTimeout(() => { busy = false; }, cooldown);
        }
      };
      el.__guardedHandler = wrapped;
      el.addEventListener('click', wrapped);
    }

    async function persistSettings(patch, {showMissingPopup = true} = {}){
      settingsState = { ...settingsState, ...patch };
      try{
        const res = await fetch('/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(patch),
        });
        if(!res.ok){
          if(showMissingPopup) showPopup("folder doesn't exist");
          await loadSettings();
          return;

        const data = await res.json();
        settingsState = { ...settingsState, ...data };

      }catch(err){
        console.warn('settings update failed', err);
        if(showMissingPopup) showPopup("folder doesn't exist");
        await loadSettings();
      }
    }

    async function checkStorage(){
      if(!navigator.storage || !navigator.storage.estimate) return true;
      try{
        const {usage = 0, quota = 0} = await navigator.storage.estimate();
        const free = Math.max(0, quota - usage);
        const freeGb = free / (1024 ** 3);
        if(freeGb < STORAGE_BLOCK_GB){
          storageBlocked = true;
          showPopup('storage critically low (<0.5 GB). uploads are blocked');
          updateStartButton();
          return false;
        }
        if(freeGb < STORAGE_WARN_GB){
          const now = Date.now();
          if(now - lastStorageWarning > 10000){
            showPopup('storage low (<1 GB remaining)');
            lastStorageWarning = now;
          }
        }
        storageBlocked = false;
        updateStartButton();
      }catch(_){}
      return !storageBlocked;
    }

    function checkMemory(){
      const perf = performance || window.performance;
      const mem = perf && perf.memory;
      if(!mem) return true;
      const { jsHeapSizeLimit = 0, usedJSHeapSize = 0 } = mem;
      const limit = jsHeapSizeLimit ? jsHeapSizeLimit * MEMORY_LIMIT_RATIO : MEMORY_LIMIT_MB * 1024 * 1024;
      if(usedJSHeapSize > limit){
        memoryBlocked = true;
        const now = Date.now();
        if(now - lastMemoryWarning > 10000){
          showPopup('memory use is high; uploads paused to prevent leaks');
          lastMemoryWarning = now;
        }
        updateStartButton();
        return false;
      }
      memoryBlocked = false;
      updateStartButton();
      return true;
    }

    function estimateDecodeMb(seconds){
      // Roughly 0.34 MB/sec for 44.1kHz stereo float
      return seconds * 0.34;
    }

    function hasMemoryForDuration(seconds){
      if(seconds <= LONG_TRACK_SEC) return true;
      const perf = performance || window.performance;
      const mem = perf && perf.memory;
      if(!mem || !mem.jsHeapSizeLimit) return true;
      const { jsHeapSizeLimit = 0, usedJSHeapSize = 0 } = mem;
      const freeMb = Math.max(0, jsHeapSizeLimit - usedJSHeapSize) / (1024 * 1024);
      const needMb = estimateDecodeMb(seconds) * 1.5; // headroom
      if(freeMb <= needMb){
        showPopup('song is too long for available memory right now');
        return false;
      }
      return true;
    }

    function getAudioDuration(file){
      return new Promise((resolve) => {

        try{
          const audio = document.createElement('audio');
          audio.preload = 'metadata';
          url = URL.createObjectURL(file);
          const cleanup = () => {
            if(url){ URL.revokeObjectURL(url); url = null; }
            audio.removeAttribute('src');
            audio.load();
          };
          const timeout = setTimeout(() => { cleanup(); resolve(-1); }, 3000);
          audio.onloadedmetadata = () => {
            clearTimeout(timeout);
            const d = audio.duration;
            cleanup();
            resolve(isFinite(d) ? d : -1);
          };
          audio.onerror = () => { clearTimeout(timeout); cleanup(); resolve(-1); };
          audio.src = url;
        }catch(_){
          if(url){ URL.revokeObjectURL(url); }
          resolve(-1);
        }
      });
    }

    // --- Progress Smoother Helper ---
    function makeProgressSmoother(bar){
      let raf = null;
      let value = 0;     // currently displayed percent
      let target = 0;    // latest requested percent
      const clamp = p => Math.max(0, Math.min(100, p));
      const tick = () => {
        // critically damped-ish exponential approach toward target
        const delta = target - value;
        // if close enough, snap to target and stop
        if (Math.abs(delta) < 0.08) {
          value = target;
          bar.style.width = value + '%';
          raf = null;
          return;
        }
        // ease toward target; 0.12 controls lag/smoothness
        value += delta * 0.12;
        bar.style.width = value + '%';
        raf = requestAnimationFrame(tick);
      };
      return {
        setImmediate(p){ value = target = clamp(p); bar.style.width = value + '%'; },
        setTarget(p){ target = clamp(p); if(!raf) raf = requestAnimationFrame(tick); },
        stop(){ if(raf){ cancelAnimationFrame(raf); raf = null; } }
      };
    }

    let etaHistoryByMode = loadEtaHistory();

    function getEtaSamplesForMode(mode){
      if(!mode) return [];
      const samples = etaHistoryByMode[mode];
      return Array.isArray(samples) ? samples.filter((v) => Number.isFinite(v) && v > 0) : [];
    }

    function getAverageThroughput(mode){
      const samples = getEtaSamplesForMode(mode);
      if(!samples.length) return null;
      const sorted = [...samples].sort((a, b) => a - b);
      const usable = sorted.length >= 5 ? sorted.slice(1, sorted.length - 1) : sorted;
      if(!usable.length) return null;
      return usable.reduce((sum, value) => sum + value, 0) / usable.length;
    }

    function recordThroughputSample(mode, songSeconds, processingSeconds){
      if(!mode || mode === 'generic') return;
      const songSec = Number(songSeconds);
      const procSec = Number(processingSeconds);
      if(!Number.isFinite(songSec) || !Number.isFinite(procSec) || songSec <= 0 || procSec <= 0) return;
      const throughput = songSec / procSec; // song seconds processed per wall second
      if(!Number.isFinite(throughput) || throughput <= 0) return;
      const current = getEtaSamplesForMode(mode);
      current.push(throughput);
      while(current.length > 10) current.shift();
      etaHistoryByMode = { ...etaHistoryByMode, [mode]: current };
      saveEtaHistory(etaHistoryByMode);
    }
    // Helper: is a task finished? (completed or stopped)

    async function rehydrateTasks(){
      if(!Array.isArray(tasks) || tasks.length === 0) return;
      try{
        const res = await fetch('/rehydrate_tasks', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ tasks })
        });
        if(!res.ok) return;
        const data = await res.json();
        if(!data || !Array.isArray(data.tasks)) return;
        const keep = new Set();
        data.tasks.forEach(t => {
          if(!t || !t.id) return;
          const idx = tasks.findIndex(x => x && x.id === t.id);
          const merged = idx >= 0 ? { ...tasks[idx], ...t } : t;
          if(idx >= 0) tasks[idx] = merged;
          else tasks.push(merged);
          keep.add(t.id);
        });
        // drop any tasks that were not completed on disk (e.g., force-quit)
        tasks = tasks.filter(t => t && keep.has(t.id));
        saveTasks();
      }catch(err){
        console.debug('rehydration skipped', err);
      }
    }

      if(!t) return false;
      const stage = (t.stage || '').toLowerCase();
      const inactive = ['ready','queued','done','stopped','error'];

      return typeof t.pct === 'number' ? (t.pct >= 0 && t.pct < 100) : true;
    }

// --- Helper to rerun a task server-side ---
    async function rerunTask(task, ui){
      const {bar, st, dl, stopPad, smooth} = ui;
      if(!task || !task.id) return;
      let ok = false, newId = null, payload = null;
      try {
        const res = await fetch('/rerun/' + task.id, { method: 'POST' });
        if (res.ok) {
          try { payload = await res.json(); } catch(_) { payload = null; }
          newId = payload && (payload.task_id || payload.id || null);
          if (newId) { ok = true; }
        }
      } catch (_) {}
      if (!ok || !newId) {
        // Treat it as a stopped/error card with rerun available
        if (st) { showStatus(st); st.textContent = 'error'; st.classList.remove('hidden'); setStatusVisibility(st, 'error'); }
        const parent = st && st.closest ? st.closest('.card') : null;
        if (parent) parent.classList.add('done');

        if (stopPad) {
          stopPad.title = 'rerun';
          stopPad.innerHTML = '';          // prevent double icon
          setRetryIcon(stopPad);
          stopPad.style.pointerEvents = '';
          stopPad.style.opacity = '';
          guardClick(stopPad, (e) => { e.preventDefault(); rerunTask(task, ui); });
        }
        updateUI();
        showError('rerun failed');
        return;
      }
      // reset visual state
      if(st){ showStatus(st); st.classList.remove('hidden'); st.textContent = formatStageLabel('preparing', 0); setStatusVisibility(st, 'preparing'); }
      if(dl){ dl.classList.remove('show'); dl.removeAttribute('href'); }
      const card = stopPad && stopPad.closest('.card');
      if(card){ card.classList.remove('done'); }
      if(smooth){ smooth.setImmediate(0); }
      // show stop square again
      if(stopPad){
        stopPad.title = 'stop';
        stopPad.innerHTML = '';
        setStopSquareIcon(stopPad);
        stopPad.style.pointerEvents = '';
        stopPad.style.opacity = '';
        guardClick(stopPad, async (e) => {
          if(stopPad.dataset.busy === '1') return;
          stopPad.dataset.busy = '1';
          e.preventDefault();
          await requestStop(task.id, task, { bar, st, dl, stopPad, smooth });
          setTimeout(() => { stopPad.dataset.busy = ''; }, 250);
        });
        setStopVisibility(stopPad, 'preparing');
      }
      task.stage = 'preparing';
      task.pct = 0;
      task.downloaded = false;
      saveTasks();
      updateUI();
      // resume tracking
      const oldId = task.id;
      task.id = newId;
      if (dl) { dl.removeAttribute('href'); }
      const row = stopPad && stopPad.closest('.item-row');
      if (row) { row.__taskId = newId; }
      saveTasks();
      trackProgress(newId, bar, st, dl, null, null, task, null, smooth, stopPad);
    }

    function createItem(task){
      const node = template.content.cloneNode(true);
      const li   = node.querySelector('.filename');
      const bar  = node.querySelector('.bar-fill');
      const st   = node.querySelector('.chip');
      const dl   = node.querySelector('.dl-pad');
      const card = node.querySelector('.card');
      const stopPad = node.querySelector('.stop-pad');
      li.textContent = formatSongPreview(task.name);
      li.title = task.name;
      const labels = node.querySelector('.labels');
      const smooth = makeProgressSmoother(bar);
      const initOverall = Math.max(0, Math.min(100, task.pct || 0));
      smooth.setImmediate(initOverall);
      if(task.stage === 'done'){
        hideStatus(st);
        dl.classList.add('show');
        dl.title = 'open folder';
        bindFolderButton(dl, task);
        card.classList.add('done');
        if(stopPad) stopPad.remove();
      }
      else if(task.stage === 'stopped'){
        // Treat as finished visually
        showStatus(st);
        st.classList.add('hidden');
        card.classList.add('done');
        if (stopPad){
          stopPad.style.display = '';
          stopPad.classList.add('show');
          stopPad.innerHTML = '';
          setRetryIcon(stopPad);
          stopPad.title = 'rerun';
        guardClick(stopPad, (e) => { e.preventDefault(); rerunTask(task, { bar, st, dl, stopPad, smooth }); });
      }
      }
      else if (task.stage === 'error' || task.pct < 0) {
        // Treat like stopped; keep label visible for context
        showStatus(st);
        st.textContent = 'error';
        const parent = st.closest('.card'); if (parent) parent.classList.add('done');
        if (stopPad){
          stopPad.style.display = '';
          stopPad.classList.add('show');
          stopPad.title = 'rerun';
          stopPad.innerHTML = '';
          setRetryIcon(stopPad);
        guardClick(stopPad, (e) => { e.preventDefault(); rerunTask(task, { bar, st, dl, stopPad, smooth }); });
      }
      }
      else {
        const sp = Math.round(Math.max(0, Math.min(100, task.pct)));
        showStatus(st);
        if(task.stage === 'queued'){
          setQueuedClearChip(st, task);
        } else {
          st.textContent = formatStageLabel(task.stage || 'queued', sp);
        }
        const effectiveStage = stageForDisplay(task.stage);
        if(effectiveStage === 'ready' || effectiveStage === 'queued' || effectiveStage === 'preparing'){
          smooth.setImmediate(0);
        } else {
          smooth.setImmediate(sp);
        }
        setStopVisibility(stopPad, effectiveStage);
        if(stopPad && task.id && isProcessing(task)){
          setStopSquareIcon(stopPad);
          stopPad.style.pointerEvents = '';
          stopPad.style.opacity = '';
          stopPad.title = 'stop';
          guardClick(stopPad, async (e) => {
            if(stopPad.dataset.busy === '1') return;
            stopPad.dataset.busy = '1';
            e.preventDefault();
            await requestStop(task.id, task, { bar, st, dl, stopPad, smooth });
            stopPad.dataset.busy = '';
          });
        }
      }
      if(task.stage !== 'done' && dl && !isProcessing(task)){
        dl.classList.add('show');
        dl.title = 'retry';
        dl.innerHTML = '';
        setRetryIcon(dl);
        guardClick(dl, (e) => { e.preventDefault(); rerunTask(task, { bar, st, dl, stopPad, smooth }); });
      }
      setStatusVisibility(st, stageForDisplay(task.stage));
      const inserted = node.children[0];
      inserted.classList.add('enter-pre');
      // Attach task id for later filtering
      inserted.__taskId = task.id;
      queue.insertBefore(inserted, queue.firstChild);
      // apply enter transition to the inserted card
      requestAnimationFrame(() => {
        inserted.classList.add('enter-active');
      });
      // Apply any stem labels if present
      const labelSource = ((task.stage === 'ready' || task.stage === 'queued') && Array.isArray(task.stemsSelection) && task.stemsSelection.length)
        ? task.stemsSelection
        : task.stems;
      applyLabels(inserted.querySelector('.labels'), labelSource);
      updateClear();
      updateVigs();
      updateStartButton();
      return {bar, st, dl, stopPad, smooth};
    }

    function withPageFade(doWork){
      const mask = document.createElement('div');
      mask.className = 'page-mask';
      document.body.appendChild(mask);
      requestAnimationFrame(() => {
        mask.classList.add('show');
        setTimeout(() => {
          try { doWork(); } finally {

            setTimeout(() => mask.remove(), 300);

    function closeActiveStreams(){
      activeStreams.forEach((stream) => {
        try{ stream.close(); } catch(_){}
      });
      activeStreams.clear();
    }

    function abortPendingUploads(){
      pendingItems.forEach((pending) => {
        if(pending && pending.xhr){
          try{ pending.xhr.abort(); } catch(_){}
        }
      });
    }

    async function clearAllTasks({ showToast = false } = {}){
      if(isClearing) return;
      isClearing = true;
      closeActiveStreams();
      abortPendingUploads();
      if(Array.isArray(tasks)){
        tasks.forEach(t => {
          if(t && t.id){
            try { fetch('/stop/' + t.id, {method:'POST'}); } catch(_){}
          }
        });
      }
      for (const el of Array.from(queue.children)) { el.remove(); }
      tasks = [];
      pendingItems.length = 0;
      lastPendingForStemSelection = null;
      startLock = false;
      startPressed = false;
      saveTasks();
      updateUI();
      try { await fetch('/clear_all_uploads', {method:'POST'}); } catch(_){ }
      isClearing = false;
      if(showToast) showPopup('all tasks cleared');
    }

    guardClick(clearBtn, async () => {
      const hasRunning = Array.isArray(tasks) && tasks.some(t => isProcessing(t));
      if(hasRunning){
        const ok = await showConfirm('A process is still running. Clear all anyway?');
        if(!ok) return;
      }
      clearAllTasks();
    });

    rehydrateTasks().finally(() => {
      // restore previous tasks
      tasks.forEach(t => {
        const {bar, st, dl, stopPad, smooth} = createItem(t);
        const last = queue.lastElementChild;
        if(last){
          requestAnimationFrame(() => {
            last.classList.add('enter-active');
          });
        }
        if(t.id && t.pct < 100 && t.pct >= 0){
          trackProgress(t.id, bar, st, dl, null, null, t, null, smooth, stopPad);
        }
      });

    /* === upload & progress logic === */
    // queue of files added by user but not yet uploaded
    const pendingItems = [];
    const activeStreams = new Map();
    let lastPendingForStemSelection = null;
    let isClearing = false;
    function closeTaskStream(taskId){
      if(!taskId) return;
      const stream = activeStreams.get(taskId);
      if(stream){
        try{ stream.close(); }catch(_){ }
        activeStreams.delete(taskId);
      }
    }

    function markTaskStopped(taskRef, ui){
      if(!taskRef || !ui) return;
      const {st, dl, stopPad, smooth, bar} = ui;
      taskRef.stage = 'stopped';
      taskRef.pct = 0;
      saveTasks();
      if(smooth){ smooth.setImmediate(0); }
      if(st){ showStatus(st); st.textContent = 'stopped'; st.classList.remove('hidden'); }
      const parent = st && st.closest ? st.closest('.card') : null;
      if(parent){ parent.classList.add('done'); }
      if(dl){ dl.classList.remove('show'); }
      if(stopPad){
        stopPad.style.pointerEvents = '';
        stopPad.style.opacity = '';
        stopPad.title = 'rerun';
        setRetryIcon(stopPad);
        guardClick(stopPad, (ev) => { ev.preventDefault(); rerunTask(taskRef, { bar, st, dl, stopPad, smooth }); });
      }
      updateUI();
    }

    async function requestStop(taskId, taskRef, ui){
      if(!taskId || !taskRef || !ui) return;
      closeTaskStream(taskId);
      markTaskStopped(taskRef, ui);
      try{ await fetch('/stop/' + taskId, { method:'POST' }); }catch(_){ }
    }
    function dropPendingById(id){
      if(!id) return;
      const idx = pendingItems.findIndex(p => p && p.id === id);
      if(idx >= 0) pendingItems.splice(idx,1);
    }
    function getTaskById(id){
      return tasks.find(t => t && t.id === id);
    }

    function getTaskByTempKey(tempKey){
      if(!tempKey) return null;
      return tasks.find(t => t && t.tempKey === tempKey);
    }

    function removeTaskRow(row){
      if(!row || !row.parentNode) return;
      row.classList.remove('enter-active');
      row.classList.add('enter-pre');
      setTimeout(() => { try { row.remove(); } catch(_){} }, 140);
    }

    async function clearQueuedTask(taskRef, row){
      if(!taskRef && !row) return;
      const rowTaskId = row ? row.__taskId : null;
      const rowTempKey = row ? row.__tempKey : null;
      const taskId = taskRef && taskRef.id ? taskRef.id : rowTaskId;
      const tempKey = taskRef && taskRef.tempKey ? taskRef.tempKey : rowTempKey;
      const resolved = taskRef || (taskId ? getTaskById(taskId) : getTaskByTempKey(tempKey));
      const stage = String((resolved && resolved.stage) || '').toLowerCase();
      if(stage && !['ready', 'queued'].includes(stage)){
        showPopup('can only clear queued songs');
        return;
      }

      closeTaskStream(taskId);
      const pendingIdx = pendingItems.findIndex((p) => p && ((taskId && p.id === taskId) || (tempKey && p.tempKey === tempKey)));
      if(pendingIdx >= 0){
        const pending = pendingItems[pendingIdx];
        if(pending && pending.xhr){
          try { pending.xhr.abort(); } catch(_){}
        }
        pendingItems.splice(pendingIdx, 1);
        if(lastPendingForStemSelection === pending){
          lastPendingForStemSelection = pendingItems.length ? pendingItems[pendingItems.length - 1] : null;
        }
      }

      tasks = tasks.filter((t) => t && !((taskId && t.id === taskId) || (tempKey && t.tempKey === tempKey)));
      saveTasks();
      removeTaskRow(row);
      updateUI();

      if(taskId){
        try { await fetch('/stop/' + taskId, { method: 'POST' }); } catch(_){}
      }
    }

    function setQueuedClearChip(st, taskRef){
      if(!st) return;
      const row = st.closest('.item-row');
      st.innerHTML = '';
      const queuedText = document.createElement('span');
      queuedText.className = 'queued-chip-default';
      queuedText.textContent = 'queued';
      const clearLink = document.createElement('a');
      clearLink.href = '#';
      clearLink.textContent = 'clear';
      clearLink.className = 'queued-chip-clear';
      clearLink.addEventListener('click', (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        clearQueuedTask(taskRef || null, row);
      });
      st.appendChild(queuedText);
      st.appendChild(clearLink);
    }

    function revealStatusesAfterStart(){
      document.querySelectorAll('#queue .chip').forEach(chip => chip.classList.remove('hidden'));
      document.querySelectorAll('#queue .stop-pad').forEach(pad => {
        const row = pad.closest('.item-row');
        const id = row ? row.__taskId : null;
        const tempKey = row ? row.__tempKey : null;
        const task = id ? getTaskById(id) : getTaskByTempKey(tempKey);
        const stage = task ? task.stage : null;

      });

    function selectedStems(){
      if(vocalsBox.checked) return ['vocals'];
      if(instBox.checked) return ['instrumental'];
      if(deuxBox && deuxBox.checked) return ['deux'];
      if(bothSeparateBox && bothSeparateBox.checked) return ['vocals', 'instrumental'];
      return [];
    }

    function resolveLatestPendingForSelection(){
      if(lastPendingForStemSelection && pendingItems.includes(lastPendingForStemSelection)){
        return lastPendingForStemSelection;
      }
      for(let i = pendingItems.length - 1; i >= 0; i -= 1){
        const pending = pendingItems[i];
        if(pending && !pending.startedProcessing){
          return pending;
        }
      }
      return null;
    }

    function applyStemSelectionToLatestPending(){
      if(startPressed || startLock) return;
      const pending = resolveLatestPendingForSelection();
      if(!pending) return;
      const stems = selectedStems();
      pending.stemsSelection = stems.slice();
      const task = pending.id ? getTaskById(pending.id) : getTaskByTempKey(pending.tempKey);
      if(task){
        task.stemsSelection = stems.slice();
        task.stems = stems.slice();
      }
      const labels = pending.ui && pending.ui.item ? pending.ui.item.querySelector('.labels') : null;
      applyLabels(labels, stems);
      saveTasks();
      updateUI();
    }

    [vocalsBox, instBox, deuxBox, bothSeparateBox].forEach((el) => {
      if(!el) return;
      el.addEventListener('change', applyStemSelectionToLatestPending);
    });

    async function handleFiles(fileList){
      const storageOk = await checkStorage();
      const memoryOk = checkMemory();
      if(!storageOk || !memoryOk){
        showPopup('cannot add songs until resources are available');
        return;
      }
      const existingCount = tasks.filter(Boolean).length;
      if(existingCount >= MAX_TASKS){
        showPopup('you already have 50 songs queued; clear some to upload more');
        return;
      }
      const makeTempKey = () => (crypto && crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()));
      const stems = selectedStems();
      const newPending = [];
      const files = [...fileList];
      const mediaFiles = files.filter((file) => {
        return (
          (file.type && (file.type.startsWith('audio/') || file.type.startsWith('video/')))
          || /\.(wav|wave|mp3|m4a|aac|flac|ogg|oga|aif|aiff|mp4|mov|mkv|webm|m4v|avi|flv|wmv|mpg|mpeg|3gp|mts|m2ts|ogv)$/i.test(file.name)
        );
      });
      if(existingCount + mediaFiles.length > MAX_TASKS){
        const slots = Math.max(0, MAX_TASKS - existingCount);
        const slotLabel = slots === 1 ? 'song' : 'songs';
        showPopup(`you can only add ${slots} more ${slotLabel} (max 50 total)`);
        return;
      }
      let availableSlots = Math.max(0, MAX_TASKS - existingCount);
      for(const file of files){
        if(availableSlots <= 0) break;
        // accept common audio even when type is empty
        const looksMedia = (
          (file.type && (file.type.startsWith('audio/') || file.type.startsWith('video/')))
          || /\.(wav|wave|mp3|m4a|aac|flac|ogg|oga|aif|aiff|mp4|mov|mkv|webm|m4v|avi|flv|wmv|mpg|mpeg|3gp|mts|m2ts|ogv)$/i.test(file.name)
        );
        if(!looksMedia) continue;

        const duration = await getAudioDuration(file);
        if(duration > 0){
          if(duration > FIVE_HOURS_SEC){
            showPopup('single song limit is 5 hours');
            continue;
          }
          if(duration > LONG_TRACK_SEC && !hasMemoryForDuration(duration)){
            continue;
          }
        }

        const tempKey = makeTempKey();
        availableSlots -= 1;
        // build UI row (ready state)
        const frag = template.content.cloneNode(true);
        const item = frag.firstElementChild;
        const li   = item.querySelector('.filename');
        const bar  = item.querySelector('.bar-fill');
        const st   = item.querySelector('.chip');
        const dl   = item.querySelector('.dl-pad');
        const card = item.querySelector('.card');
        const stopPad = item.querySelector('.stop-pad');
        li.textContent = formatSongPreview(file.name);
        li.title = file.name;
        st.textContent = '';
        st.classList.add('chip-dim');
        st.classList.add('hidden');
        dl.classList.remove('show');
        if (stopPad) stopPad.style.display = 'none';
        item.classList.add('enter-pre');
        item.__tempKey = tempKey;
        queue.insertBefore(item, queue.firstChild);
        requestAnimationFrame(() => {
          item.classList.add('enter-active');
        });
        updateVigs();
        const smooth = makeProgressSmoother(bar);
        smooth.setImmediate(0);
        // record pending entry
        const pending = { file, ui:{item, li, bar, st, dl, card, stopPad, smooth}, started:false, id:null, stems:null, tempKey, autoStart:startPressed, startedProcessing:false, stemsSelection: stems.slice(), durationSec: duration > 0 ? duration : null };
        pendingItems.push(pending);
        lastPendingForStemSelection = pending;
        newPending.push(pending);
        // persist placeholder task (no id yet)
        tasks.push({ id:null, name:file.name, pct:0, stage:'ready', stems:[], file:null, tempKey, out_dir:null, downloaded:false, stemsSelection: stems.slice(), durationSec: duration > 0 ? duration : null });
        applyLabels(item.querySelector('.labels'), pending.stemsSelection);
        saveTasks();
        updateUI();
      }
      if (fileInput) fileInput.value = '';
      updateStartButton();
    }

    function uploadWithStems(pending, stems){
      pending.started = true;
      pending.uploadPromise = new Promise((resolve) => {
        const {file, ui} = pending;
        const {st, dl, card, stopPad, bar, smooth} = ui;
        const stemsSelection = Array.isArray(pending.stemsSelection) && pending.stemsSelection.length
          ? pending.stemsSelection
          : stems;
        const data = new FormData();
        data.append('file', file);
        data.append('stems', stemsSelection.join(','));
        const xhr = new XMLHttpRequest();
        pending.xhr = xhr;
        xhr.open('POST', '/upload');
        xhr.upload.onprogress = (evt) => {
          if(evt.lengthComputable){
            const pct = Math.round(evt.loaded / evt.total * 100);
            st.textContent = `uploading (${pct}%)`;
            st.classList.remove('chip-dim');
          }
        };
        xhr.onload = () => {
          if(xhr.status >= 400){ showStatus(st); st.classList.remove('hidden'); st.textContent = 'error'; return resolve(); }
          st.classList.remove('chip-dim');
          showStatus(st);
          setStatusVisibility(st, stageForDisplay('ready'));
          smooth.setImmediate(0);
          let res = {};
          try {
            res = JSON.parse(xhr.responseText || '{}');
            const msg = res.detail && res.detail.message;
            if(msg){
              showStatus(st);
              st.textContent = 'error';
              st.classList.add('chip-dim');
              if (stopPad) stopPad.style.display = 'none';
              else showError(msg);
            }
          }catch(_){ }
          if(res.detail && res.detail.message){
            try{
              const msg = res.detail.message;
              showStatus(st); st.textContent = 'error'; st.classList.add('chip-dim'); if(stopPad) stopPad.style.display = 'none';
              else showError(msg);
            }catch(_){ }
            return resolve();
          }
          const parsed = JSON.parse(xhr.responseText);
          pending.id = parsed.task_id;
          pending.stems = parsed.stems;
          ui.item.__taskId = parsed.task_id;
          // replace placeholder task
          const idx = tasks.findIndex(t => t.tempKey === pending.tempKey);
          const t = {
            id:parsed.task_id,
            name:file.name,
            pct:0,
            stage:'ready',
            stems:parsed.stems,
            tempKey: pending.tempKey,
            out_dir: null,
            downloaded:false,
            stemsSelection: stemsSelection.slice(),
            durationSec: pending.durationSec || null,
          };
          if(idx>=0) tasks[idx]=t; else tasks.push(t);
          if(startPressed || pending.autoStart){
            t.stage = 'queued';
            t.pct = 0;
            if(st){
              showStatus(st);
              setQueuedClearChip(st, t);
              st.classList.remove('hidden');
            }
          }
          saveTasks(); updateUI();
          // enable stop now that we have an id
          if (stopPad){
            setStopSquareIcon(stopPad);
            stopPad.style.pointerEvents = '';
            stopPad.style.opacity = '';
            stopPad.title = 'stop';
            guardClick(stopPad, async (e) => {
              if(stopPad.dataset.busy === '1') return;
              stopPad.dataset.busy = '1';
              e.preventDefault();
              await requestStop(parsed.task_id, t, { bar, st, dl, stopPad, smooth });
              stopPad.dataset.busy = '';
              updateUI();
            });
            setStopVisibility(stopPad, 'ready');
          }
          // start polling
          trackProgress(res.task_id, ui.bar, ui.st, ui.dl, null, null, t, null, smooth, stopPad);
          if(pending.autoStart){
            startTaskWhenReady(pending);
          }
          resolve();
        };
        xhr.onerror = () => { showStatus(st); st.classList.remove('hidden'); st.textContent = 'error'; resolve(); };
        xhr.send(data);
      });
      return pending.uploadPromise;
    }

    function startTaskWhenReady(pending){
      if(!pending || pending.startedProcessing) return;
      if(!pending.uploadPromise){ return; }
      pending.startedProcessing = true;
      pending.uploadPromise.then(async () => {
        if(!pending.id) return;
        try{ await fetch('/start/' + pending.id, { method:'POST' }); }catch(_){ /* ignore */ }
      });
    }

    async function startSequentialProcessing(){
      if(startLock || (startBtn && startBtn.disabled)) return;
      const storageOk = await checkStorage();
      const memoryOk = checkMemory();
      if(!storageOk || !memoryOk){
        showPopup('cannot start until storage and memory are sufficient');
        return;
      }
      startLock = true;
      updateStartButton();
      let markedStarted = false;
      const markReadyQueuedUI = () => {
        const rows = Array.from(queue.children);
        let changed = false;
        rows.forEach(row => {
          const id = row.__taskId;
          const tempKey = row.__tempKey;
          const task = id ? getTaskById(id) : getTaskByTempKey(tempKey);
          const chip = row.querySelector('.chip');
          if(task && (!task.stage || task.stage === 'ready' || task.stage === 'queued')){
            if(task.stage !== 'queued' || task.pct !== 0){
              task.stage = 'queued';
              task.pct = 0;
              changed = true;
            }
            if(chip){
              showStatus(chip);
              setQueuedClearChip(chip, task);
              chip.classList.remove('hidden');
            }
            return;
          }
          if(chip && (chip.textContent || '').toLowerCase() === 'ready'){
            showStatus(chip);
            setQueuedClearChip(chip, task || null);
            chip.classList.remove('hidden');
          }
        });
        if(changed){
          saveTasks();
        }
      };
      const startReadyTasks = async () => {
        const ready = Array.isArray(tasks)
          ? tasks.filter(t => t && t.id && (!t.stage || t.stage === 'ready' || t.stage === 'queued'))
          : [];
        for(const t of ready){
          try{
            await fetch('/start/' + t.id, { method:'POST' });
            t.stage = 'queued';
            t.pct = 0;
            if(typeof t.downloaded === 'undefined'){ t.downloaded = false; }
          }catch(_){}
        }
        saveTasks();
        markReadyQueuedUI();
      };
      try{
        const stems = selectedStems();
        const missingSelections = pendingItems.some(p => p && !p.started && (!Array.isArray(p.stemsSelection) || p.stemsSelection.length === 0));
        if(stems.length === 0 && missingSelections){
          showPopup('please select at least one stem');
          return;
        }
        startGeneration += 1;
        startPressed = true;
        markedStarted = true;
        markReadyQueuedUI();
        let startIndex = 0;
        revealStatusesAfterStart();
        while(startIndex < pendingItems.length){
          const p = pendingItems[startIndex];
          startIndex += 1;
          if(p){ p.autoStart = true; }
          if(!p.uploadPromise){
            const stemsForPending = (p && Array.isArray(p.stemsSelection) && p.stemsSelection.length)
              ? p.stemsSelection
              : stems;
            if(!stemsForPending.length){
              showPopup('please select at least one stem');
              continue;
            }
            await uploadWithStems(p, stemsForPending);
          }
          if(p.uploadPromise){
            await p.uploadPromise;
          }
          startTaskWhenReady(p);
        }
        await startReadyTasks();
        startPressed = false;
        markedStarted = false;
        pendingItems.forEach(p => { if(p){ p.autoStart = false; } });
        updateUI();
      } finally {
        if(markedStarted){
          startPressed = false;
        }
        startLock = false;
        updateStartButton();
      }
    }
    if(startBtn) guardClick(startBtn, startSequentialProcessing);

    // --- Progress tracking for uploads (SSE) ---
    function displayStage(stage){
      if(!stage) return 'queued';
      const lower = stage.toLowerCase();
      if(lower.startsWith('preparing')) return 'preparing';
      if(lower.startsWith('write') || lower.startsWith('merge') || lower.startsWith('zip') || lower.startsWith('metadata') || lower.startsWith('video.mux')) return 'finishing';
      if(lower.includes('deux')) return 'voc/inst';
      if(lower.includes('vocals')) return 'vocals';
      if(lower.includes('instrumental')) return 'instrumental';
      if(lower.includes('drums')) return 'drums';
      if(lower.includes('bass')) return 'bass';
      if(lower.includes('other')) return 'other';
      if(lower.includes('guitar')) return 'guitar';
      if(lower.includes('error')) return 'error';
      if(lower.startsWith('prepare')) return 'preparing';
      if(lower.startsWith('load_audio')) return 'loading';
      const parts = lower.split('.');
      return parts[parts.length-1] || lower;
    }

    function trackProgress(taskId, bar, st, dl, _a, _b, taskRef, _c, smooth, stopPad){
      try{
        const es = new EventSource('/progress/' + taskId);
        let maxDisplayedPct = 0;
        const etaState = {
          mode: detectProcessingMode(taskRef, null),
          startedAtMs: null,
          currentPhaseId: null,
          phaseStartMs: null,
          completedPhaseSec: [],
          smoothedEtaSec: null,
          observedMode: null,
        };
        activeStreams.set(taskId, es);
        es.addEventListener('message', (ev) => {
          if(isClearing) return;
          let data = null;
          try { data = JSON.parse(ev.data); } catch(_) {}
          if(!data) return;
          const rawStage = data.stage;
          const stage = rawStage === 'errored' ? 'error' : rawStage;
          const effectiveStage = stageForDisplay(stage);
          const pct = data.pct;
          if(taskRef){
            taskRef.stage = stage;
            taskRef.pct = pct;
            if(data.stems) taskRef.stems = data.stems;
            if(data.out_dir) taskRef.out_dir = data.out_dir;
            if(data.zip) taskRef.zip = data.zip;
            if(typeof taskRef.downloaded === 'undefined'){ taskRef.downloaded = false; }
            saveTasks();
          }
          if(data.stems && st){
            const parentRow = st.closest('.item-row');
            applyLabels(parentRow ? parentRow.querySelector('.labels') : null, data.stems);
          }
          if(st){ showStatus(st); }
          if(stage === 'done'){
            const completedMode = etaState.observedMode || detectProcessingMode(taskRef, data);
            if(taskRef && etaState.startedAtMs != null){
              const processingSeconds = Math.max(0, (Date.now() - etaState.startedAtMs) / 1000);
              recordThroughputSample(completedMode, taskRef.durationSec, processingSeconds);
            }
            smooth.setTarget(100);
            hideStatus(st);
            if(dl){
              const ref = taskRef || { id: taskId, out_dir: data.out_dir, zip: data.zip, downloaded:true };
              ref.downloaded = true;
              if(taskRef){
                taskRef.downloaded = true;
                saveTasks();
              }
              setFolderIcon(dl);
              dl.classList.add('show');
              dl.title = 'open folder';
              bindFolderButton(dl, ref);
            }
            if(stopPad) stopPad.remove();
            const parent = st.closest('.card'); if(parent) parent.classList.add('done');
            dropPendingById(taskId);
            es.close();
            activeStreams.delete(taskId);
            updateUI(); return;
          }
          if (stage === 'stopped') {
            if (taskRef) { taskRef.stage = 'stopped'; taskRef.pct = 0; saveTasks(); }
            showStatus(st);
            st.textContent = 'stopped';
            st.classList.remove('hidden');
            const parent = st.closest('.card'); if (parent) parent.classList.add('done');
            if (stopPad) {
              stopPad.style.display = '';
              stopPad.classList.add('show');
              stopPad.title = 'rerun';
              stopPad.innerHTML = '';
              setRetryIcon(stopPad);
              guardClick(stopPad, (e) => { e.preventDefault(); rerunTask(taskRef, { bar, st, dl, stopPad, smooth }); });
            }
            dropPendingById(taskId);
            es.close();
            activeStreams.delete(taskId);
            updateUI(); return;
          }
          if (typeof pct === 'number' && pct >= 0) {
            const sp = Math.round(Math.max(0, Math.min(100, pct)));
            const mode = detectProcessingMode(taskRef, data);
            etaState.mode = mode;
            if(mode && mode !== 'generic'){
              etaState.observedMode = mode;
            }
            const phaseForStart = getModePhase(mode, stage, pct);
            if(phaseForStart && etaState.startedAtMs == null){
              etaState.startedAtMs = Date.now();
            }
            let displayPct = sp;
            const mapped = mapModeProgress(mode, stage, pct);
            if(typeof mapped === 'number' && Number.isFinite(mapped)){
              displayPct = mapped;
            }
            maxDisplayedPct = Math.max(maxDisplayedPct, displayPct);
            displayPct = Math.round(Math.max(0, Math.min(100, maxDisplayedPct)));
            let friendlyStage = displayStage(effectiveStage);
            if(mode === 'bothSeparate' && effectiveStage !== 'queued' && effectiveStage !== 'ready' && effectiveStage !== 'preparing'){
              friendlyStage = displayPct < 50 ? 'vocals' : (displayPct < 100 ? 'instrumental' : 'finishing');
            }
            if (effectiveStage === 'queued' || effectiveStage === 'ready' || effectiveStage === 'preparing') {
              if(effectiveStage === 'queued'){
                setQueuedClearChip(st, taskRef || null);
              } else {
                st.textContent = friendlyStage || 'queued';
              }
              smooth.setImmediate(0);
            } else {
              let etaSuffix = '';
              const nowMs = Date.now();
              const rawEtaSeconds = estimateEtaFromHistory(etaState, mode, taskRef, nowMs)
                ?? estimateEtaFromPhase(etaState, mode, stage, pct, nowMs);
              const etaSeconds = clampEtaForDisplay(rawEtaSeconds, displayPct, stage);
              if(etaSeconds != null){
                etaSuffix = ` - ${formatEta(etaSeconds)}`;
              }
              st.textContent = `${displayPct}%${etaSuffix}`;
              smooth.setTarget(displayPct);
            }
            if(stage !== 'done' && dl){
              dl.classList.remove('show');
            }
          } else {
            st.textContent = formatStageLabel(effectiveStage, 0);
          }
          setStatusVisibility(st, effectiveStage);
          setStopVisibility(stopPad, effectiveStage);
        });
        es.addEventListener('error', (ev) => {
          if (taskRef && taskRef.stage === 'stopped') {
            es.close();
            activeStreams.delete(taskId);
            updateUI();
            return;
          }
          let errPayload = null;
          let errCode = null;
          let errMsg = null;
          try{
            if(ev && ev.data){ errPayload = JSON.parse(ev.data); }
          }catch(_){}
          if(errPayload){
            errCode = errPayload.code || (errPayload.detail && errPayload.detail.code);
            errMsg = errPayload.message || (errPayload.detail && errPayload.detail.message);
          }
          if (taskRef) {
            taskRef.stage = 'error';
            taskRef.pct = -1;
            saveTasks();
          }
          if (st) {
            showStatus(st);
            st.textContent = 'error';
            st.classList.remove('hidden');
          }
          setStatusVisibility(st, 'error');
          const parent = st && st.closest ? st.closest('.card') : null;
          if (parent) parent.classList.add('done');

          if (stopPad) {
            stopPad.style.display = '';
            stopPad.classList.add('show');
            stopPad.title = 'rerun';
            stopPad.innerHTML = '';
            setRetryIcon(stopPad);
            guardClick(stopPad, (e) => {
              e.preventDefault();
              if (taskRef) rerunTask(taskRef, { bar, st, dl, stopPad, smooth });
            });
          }
          dropPendingById(taskId);
          es.close();
          activeStreams.delete(taskId);
          if(errMsg){
            showPopup(errMsg);
          }
          updateUI();
        });
              }catch(e){
        showStatus(st);
        st.textContent = 'error';
        if(taskRef){ taskRef.stage = 'error'; taskRef.pct = -1; saveTasks(); }
        updateUI();
      }
    }
</script>
